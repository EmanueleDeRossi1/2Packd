name = "gym-occupancy-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./public"

# Retain logs (after updating to Workers Paid)
[observability]
enabled = true
head_sampling_rate = 1

# KV Namespace binding
[[kv_namespaces]]
binding = "GYM_DATA"
id = "ebaf19ce6bea438da05b97b0f45e5223"

# Scheduled trigger - one operator per run, staggered.
# All runs at 21:xx UTC = 23:xx Berlin in summer (CEST) / 22:xx in winter (CET),
[triggers]
crons = ["0 21 * * *", "15 21 * * *", "30 21 * * *", "45 21 * * *"]

# Environment for development
[env.dev]
[[env.dev.kv_namespaces]]
binding = "GYM_DATA"
id = "ebaf19ce6bea438da05b97b0f45e5223"

# Access data to D1 DB
[[d1_databases]]
binding = "gym_occupancy_history"
database_name = "gym-occupancy-history"
database_id = "da044d7a-e764-4732-bb29-50486c263ed9"
