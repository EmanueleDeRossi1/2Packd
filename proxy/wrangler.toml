name = "gym-occupancy-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

[assets]
directory = "./public"

# KV Namespace binding
[[kv_namespaces]]
binding = "GYM_DATA"
id = "ebaf19ce6bea438da05b97b0f45e5223"

# Scheduled trigger - runs daily at 3.26 AM UTC
[triggers]
crons = ["26 3 * * *"]

# Environment for development
[env.dev]
[[env.dev.kv_namespaces]]
binding = "GYM_DATA"
id = "ebaf19ce6bea438da05b97b0f45e5223"
